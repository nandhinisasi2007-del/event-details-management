<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Ticket</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="booking-container">

        <h1>Book Tickets</h1>

        <label>
            Event Name
        </label>

        <input
        type="text"
        id="eventName"
        readonly>

        <label>
            Ticket Quantity
        </label>

        <input
        type="number"
        id="quantity"
        min="1"
        value="1"
        oninput="updateTotal()">

        <label>
            Promo Code
        </label>

        <input
        type="text"
        id="promo">

        <h3 id="total">
            Total : ₹500
        </h3>

        <button onclick="bookTicket()">
            Confirm Booking
        </button>

    </div>

    <script src="css/js/booking.js"></script>

</body>
</html>
